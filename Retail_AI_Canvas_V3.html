function useTweaks(defaults) {
  const [values, setValues] = useState(defaults);
  const setTweak = useCallback((key, val) => {
    setValues(prev => ({ ...prev, [key]: val }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ children }) {
  const [open, setOpen] = useState(false);
  const dragRef  = useRef(null);
  const offsetRef = useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clamp = useCallback(() => {
    const p = dragRef.current; if (!p) return;
    const w = p.offsetWidth, h = p.offsetHeight;
    offsetRef.current = {
      x: Math.min(Math.max(PAD, offsetRef.current.x), Math.max(PAD, window.innerWidth - w - PAD)),
      y: Math.min(Math.max(PAD, offsetRef.current.y), Math.max(PAD, window.innerHeight - h - PAD)),
    };
    p.style.right  = offsetRef.current.x + 'px';
    p.style.bottom = offsetRef.current.y + 'px';
  }, []);

  useEffect(() => {
    if (!open) return;
    clamp();
    const ro = typeof ResizeObserver !== 'undefined' ? new ResizeObserver(clamp) : null;
    if (ro) { ro.observe(document.documentElement); return () => ro.disconnect(); }
    window.addEventListener('resize', clamp);
    return () => window.removeEventListener('resize', clamp);
  }, [open, clamp]);

  useEffect(() => {
    const onMsg = e => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode')   setOpen(true);
      if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = e => {
    const p = dragRef.current; if (!p) return;
    const r = p.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const sr = window.innerWidth  - r.right;
    const sb = window.innerHeight - r.bottom;
    const move = ev => { offsetRef.current = { x: sr - (ev.clientX - sx), y: sb - (ev.clientY - sy) }; clamp(); };
    const up   = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>Tweaks</b>
          <button className="twk-x" aria-label="Close tweaks" onMouseDown={e => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label }) { return <div className="twk-sect">{label}</div>; }

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value} onChange={e => onChange(e.target.value)} />
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = useRef(null);
  const [dragging, setDragging] = useState(false);
  const opts = options.map(o => typeof o === 'object' ? o : { value:o, label:o });
  const idx = Math.max(0, opts.findIndex(o => o.value === value));
  const n = opts.length;
  const valueRef = useRef(value); valueRef.current = value;
  const segAt = cx => {
    const r = trackRef.current.getBoundingClientRect();
    return opts[Math.max(0, Math.min(n-1, Math.floor(((cx-r.left-2)/(r.width-4))*n)))].value;
  };
  const onPointerDown = e => {
    setDragging(true);
    const v0 = segAt(e.clientX); if (v0 !== valueRef.current) onChange(v0);
    const move = ev => { const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); };
    const up   = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-row">
      <div className="twk-lbl"><span>{label}</span></div>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown} className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb" style={{ left:`calc(2px + ${idx}*(100% - 4px)/${n})`, width:`calc((100% - 4px)/${n})` }} />
        {opts.map(o => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>
        ))}
      </div>
    </div>
  );
}

/* ─── APP ROOT ───────────────────────────────────────────────────── */
// ──────────────────────────────────────────────────────────────────────────
// VersionBadge — bottom-right indicator showing what's running.
//
// The visible label is hardcoded SITE_VERSION (semver-ish, human-readable).
// Bump it manually when shipping a meaningful change. The VERSION file in
// the repo root mirrors this for tracking/CHANGELOG purposes — keep them in
// sync. Display is instant: doesn't wait for any fetch.
//
// version.json (written by deploy.php after each pull) enriches the tooltip
// with the exact git commit, branch, and deploy time — so anyone debugging
// can see the precise build. If version.json is missing (fresh clone before
// first deploy, or local dev), the badge still shows the version label,
// just without the git-detail tooltip.
// ──────────────────────────────────────────────────────────────────────────
const SITE_VERSION = '0.7.3';
const VERSION_REPO_URL = 'https://github.com/dennislee23/kkt-retail-canvas';

const formatRelative = (isoString) => {
  if (!isoString) return '';
  const t = Date.parse(isoString);
  if (Number.isNaN(t)) return '';
  const diffSec = Math.max(0, (Date.now() - t) / 1000);
  if (diffSec < 60)        return Math.floor(diffSec) + 's ago';
  if (diffSec < 3600)      return Math.floor(diffSec / 60) + ' min ago';
  if (diffSec < 86400)     return Math.floor(diffSec / 3600) + ' h ago';
  if (diffSec < 86400 * 7) return Math.floor(diffSec / 86400) + ' d ago';
  return new Date(t).toISOString().slice(0, 10);
};

const VersionBadge = () => {
  const [info, setInfo] = useState(null);

  useEffect(() => {
    let cancelled = false;
    fetch('version.json', { cache: 'no-store' })
      .then(r => r.ok ? r.json() : null)
      .then(data => { if (!cancelled && data && (data.short || data.commit)) setInfo(data); })
      .catch(() => { /* silently fall back to hardcoded version */ });
    return () => { cancelled = true; };
  }, []);

  // Tooltip is built from whatever info we have. With version.json: full
  // commit message + branch + relative deploy time. Without: just the
  // version label. Either way, the badge renders.
  const tooltipParts = [`version ${SITE_VERSION}`];
  if (info) {
    if (info.short) tooltipParts.push('build ' + info.short);
    if (info.message) tooltipParts.push(info.message);
    if (info.branch && info.branch !== 'main') tooltipParts.push('branch: ' + info.branch);
    if (info.deployedAt) tooltipParts.push('deployed ' + formatRelative(info.deployedAt));
  } else {
    tooltipParts.push('build info pending — run Update Now to refresh');
  }

  const href = info?.commit
    ? VERSION_REPO_URL + '/commit/' + info.commit
    : VERSION_REPO_URL;

  return (
    <a href={href} target="_blank" rel="noopener noreferrer"
       title={tooltipParts.join(' · ')}
       style={{
         position:'fixed', bottom:'10px', right:'14px',
         fontSize:'11px',
         fontFamily:'DM Sans',
         color:'var(--text-muted)',
         textDecoration:'none',
         opacity:0.55,
         letterSpacing:'.02em',
         zIndex:5,
         transition:'opacity .15s',
       }}
       onMouseEnter={e => e.currentTarget.style.opacity = '1'}
       onMouseLeave={e => e.currentTarget.style.opacity = '0.55'}>
      v{SITE_VERSION}
    </a>
  );
};

const App = () => {
  const [screen, setScreen]                   = useState('landing');
  const [answers, setAnswers]                 = useState({});
  const [domain, setDomain]                   = useState(null);
  const [play, setPlay]                       = useState(null);
  const [copilot, setCopilot]                 = useState(false);
  const [copilotPrefill, setCopilotPrefill]   = useState(null);
  // Snapshot of the service card the advisor was opened FROM (if any).
  // Used to drive card-specific starter prompts in CopilotPanel — when the
  // user opens the advisor from a margin/cash card, the four scenario
  // suggestions should be margin/cash questions, not the generic ones. We
  // capture at open-time because `play` is nulled when SolutionCardPanel
  // closes (which happens before the advisor opens).
  const [copilotPlay, setCopilotPlay]         = useState(null);
  const [stageFilter, setStageFilter]         = useState(null);
  const [profileSection, setProfileSection]   = useState('company');
  const [t, setTweak]                         = useTweaks(TWEAK_DEFAULTS);

  useEffect(() => {
    const goHome = () => {
      setScreen('landing');
      setDomain(null);
      setPlay(null);
      setCopilot(false);
      setStageFilter(null);
    };
    // KKTechnologies profile entry from ProfileFooter links. Each link in
    // the footer dispatches CustomEvent('retail-canvas:profile', { detail:
    // { section: 'company'|'how-we-work'|'team'|'contact' } }) — we
    // capture the section, switch screen, and let KKProfileScreen route
    // internally on the active prop.
    const onProfile = (e) => {
      const section = e?.detail?.section || 'company';
      setProfileSection(section);
      setPlay(null);
      setCopilot(false);
      setScreen('profile');
    };
    window.addEventListener('retail-canvas:home', goHome);
    window.addEventListener('retail-canvas:profile', onProfile);
    return () => {
      window.removeEventListener('retail-canvas:home', goHome);
      window.removeEventListener('retail-canvas:profile', onProfile);
    };
  }, []);

  // Cmd+K / Ctrl+K toggles the advisor anywhere on the site. Escape closes
  // it when open. Both bindings are global so the user is never more than
  // one keystroke from the assistant — including from inside any screen,
  // any modal, any input. The handler runs at the document level and
  // doesn't interfere with typed-text input boxes (which rarely use Cmd+K).
  useEffect(() => {
    const onKey = (e) => {
      // Toggle on Cmd+K (mac) or Ctrl+K (others). Match key case-insensitively
      // so caps-lock doesn't break it.
      if ((e.metaKey || e.ctrlKey) && (e.key === 'k' || e.key === 'K')) {
        e.preventDefault();
        setCopilot(c => !c);
        return;
      }
      // Escape closes only if the copilot is open. We don't read state here
      // — calling setCopilot with a function lets the component decide.
      if (e.key === 'Escape') {
        setCopilot(c => c ? false : c);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  // When the advisor closes (any path: X, Esc, Cmd+K toggle, navigate-to-card,
  // navigate-to-stage), drop the captured card snapshot so the NEXT open
  // doesn't carry stale card-specific starter prompts. Generic Cmd+K open
  // after closing-from-card should show the four generic scenarios.
  useEffect(() => {
    if (!copilot) setCopilotPlay(null);
  }, [copilot]);

  // openCopilot(prefill, forPlay) — open the advisor.
  //   prefill : optional string pre-loaded into the input (used by the
  //             "Tell me more about X" button on SolutionCardPanel).
  //   forPlay : optional service card object captured at open-time so
  //             CopilotPanel can render card-specific starter prompts
  //             (the card's diagnosticQuestions). Pass null/undefined for
  //             generic entry points (header link, Cmd+K, screen nudges).
  const openCopilot = (prefill, forPlay) => {
    setCopilotPrefill(prefill || null);
    setCopilotPlay(forPlay || null);
    setCopilot(true);
  };

  // Navigation helpers triggered from inside the advisor panel — clicking a
  // cited card or a stage/roadmap link in an answer closes the advisor and
  // takes the user to the corresponding screen. Each closes the panel via
  // setCopilot(false), then mutates app state.
  const goToCardFromAdvisor = (cardId) => {
    const found = findServiceAndDomainById(cardId);
    if (!found) return;
    setCopilot(false);
    setDomain(found.domain);
    setPlay(found.play);
  };
  const goToStageFromAdvisor = (stageNum) => {
    setCopilot(false);
    if (stageNum === 3) { goToStage3Domain(); return; }
    setStageFilter(stageNum);
    setScreen('domains');
  };
  const goToRoadmapFromAdvisor = () => {
    setCopilot(false);
    setScreen('roadmap');
  };
  const goToDomain  = d  => {
    // Expand and Monetize: jump straight to its DomainScreen (no intermediary grid)
    setDomain(d);
    setScreen('domain');
  };
  const goToStage3Domain = () => {
    const d = (_ALL_DOMAINS||[]).find(x => x.id === 'expand_monetize');
    if (d) { setDomain(d); setScreen('domain'); }
  };
  const goToWorkforceAI = () => {
    const d = (_ALL_DOMAINS||[]).find(x => x.id === 'workforce_ai');
    if (d) { setDomain(d); setScreen('domain'); }
  };
  const fromDomain  = () => setScreen((answers.pressures||[]).length ? 'recommended' : screen === 'domain' ? 'domains' : 'browse');
  const goToStage   = s  => {
    // Stage 3 goes straight to the Expand and Monetize domain screen
    if (s === 3) { goToStage3Domain(); return; }
    setStageFilter(s); setScreen('domains');
  };
  const goBrowse    = () => { setStageFilter(null); setScreen('browse'); };
  const goRoadmap   = () => setScreen('roadmap');

  const copilotContext = {
    pressures: (answers.pressures||[]).map(id => ((_PRESSURES||[]).find(p => p.id===id)||{}).label).filter(Boolean),
    domain:    domain?.title || '',
    play:      play?.title   || '',
  };

  return (
    <div style={{ '--accent': t.accentColor }}>
      {screen==='landing'     && <LandingScreen onStart={() => setScreen('questions')} onBrowse={goBrowse} onStage={goToStage} onCopilot={() => openCopilot()} />}
      {screen==='questions'   && <QuestionsScreen onDone={a => { setAnswers(a); setScreen('recommended'); }} onBack={() => setScreen('landing')} onCopilot={() => openCopilot()} />}
      {screen==='recommended' && <RecommendedScreen answers={answers} onPlay={(p,d) => { setDomain(d); setPlay(p); }} onDomain={goToDomain} onBrowse={goBrowse} onRoadmap={goRoadmap} onBack={() => setScreen('questions')} onCopilot={openCopilot} />}
      {screen==='roadmap'     && <RoadmapScreen answers={answers} onBack={() => setScreen((answers.pressures||[]).length ? 'recommended' : 'landing')} onPlay={(p,d) => { setDomain(d); setPlay(p); }} onCopilot={() => openCopilot()} />}
      {screen==='domains'     && <DomainsScreen stageFilter={stageFilter} onClearFilter={() => setStageFilter(null)} onDomain={d => d.id === 'expand_monetize' ? goToStage3Domain() : goToDomain(d)} onBack={() => setScreen('landing')} onCopilot={() => openCopilot()} />}
      {screen==='browse'      && <BrowseScreen onPlay={(p,d) => { setDomain(d); setPlay(p); }} onDomain={goToDomain} onBack={() => setScreen('landing')} stageFilter={stageFilter} onClearFilter={() => setStageFilter(null)} onCopilot={() => openCopilot()} />}
      {screen==='domain' && domain && <DomainScreen domain={domain} onPlay={p => setPlay(p)} onBack={fromDomain} onCopilot={openCopilot} />}
      {screen==='profile'     && <KKProfileScreen section={profileSection} onBack={() => setScreen('landing')} />}

      {play && domain && <SolutionCardPanel play={play} domain={domain} onClose={() => setPlay(null)} onCopilot={msg => { openCopilot(msg, play); setPlay(null); }} />}

      <CopilotPanel
        isOpen={copilot}
        onClose={() => setCopilot(false)}
        context={copilotContext}
        prefill={copilotPrefill}
        playForStarters={copilotPlay}
        onGoToCard={goToCardFromAdvisor}
        onGoToStage={goToStageFromAdvisor}
        onGoToRoadmap={goToRoadmapFromAdvisor} />

      <TweaksPanel>
        <TweakSection label="Theme" />
        <TweakColor label="Accent color" value={t.accentColor} onChange={v => setTweak('accentColor', v)} />
        <TweakSection label="Typography" />
        <TweakRadio label="Heading style" value={t.fontStyle} options={['serif','sans']} onChange={v => setTweak('fontStyle', v)} />
      </TweaksPanel>

      <VersionBadge />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
