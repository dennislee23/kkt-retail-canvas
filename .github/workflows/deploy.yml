name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger server pull (retail.kittykat.tech)
        run: |
          curl -fsS --retry 3 --retry-delay 5 \
            "https://retail.kittykat.tech/deploy.php?key=${{ secrets.DEPLOY_KEY }}&mode=hard"
